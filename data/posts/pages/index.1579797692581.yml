content: "1 Cup of this tomorrow morning will burn 3lbs of belly fat\r\n\r\nIf you haven’t tried this yet, you’re going to want to add this to your morning routine\r\nConsuming 1 cup of this delicious hot beverage in the A.M. sets your body up to burn more fat than 45 exhausting minutes on the treadmill.\r\n\r\nIn fact, some folks are losing up to 25 Lbs of fat in just 19 days by drinking it daily every morning.\r\n\r\nPlus, it’s super easy to make right in your own kitchen. \r\n\r\nTake a look for yourself:  http://www.fatbellyfix.xyz"
