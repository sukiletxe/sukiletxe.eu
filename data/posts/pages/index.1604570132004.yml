content: "Geia sas kýrie / kyría! \r\nElpízo na eísai kalá ! \r\n \r\nMe synchoreíte pou epikoinonísame mazí sas me aftón ton trópo! \r\nSas parousiázo tin kyría Sylvie Dominger! \r\nGia na to kánoume sýntomo kai na travíxoume tin prosochí sas, apofasísame na paréchoume ti voítheiá mas ston plithysmó metá tin pandimía pou prokaleítai apó to Covid-19. Aftí i pandimía katéstrepse pollá átoma oikonomiká. \r\n \r\nO koinós stóchos eínai na entharrýnoume kai na ypostiríxoume tous anthrópous pou antimetopízoun oikonomikés dyskolíes kai na tous voithísoume na ektelésoun érga genikoú endiaférontos, eíte prókeitai gia dimósio (krátos, topikés koinótites) eíte gia idiotikó (idrýmata, enóseis). \r\nBoreíte na lávete chrimatodótisi se polý sýntomo chronikó diástima me epitókio 3%. \r\nAplá peíte mas póso chreiázeste! \r\n \r\nDiéfthynsi ilektronikoú tachydromeíou: Veronica.carvalho14@hotmail.com \r\nWhatsapp epafí: +33 7 56 97 15 50"
