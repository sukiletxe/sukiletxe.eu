content: "I really love Unicone. From the sweet service, to \r\nthe yummy soft serve, I like their creative flare of having a flavour of the week from a different place from around the world.\r\n\r\n\r\n\r\nI got to try 2 this year; baklawa (I mean, \r\nI had to try it) and I think it was lemon sorbet with some kind of Morrocan cookie...\r\n(don't quote me on that last one). They were both unique in flavour and delicious!\r\nCan't wait for next Summer - and excited to have more than just Ca Lem to visit for interesting soft serves!!\r\n\r\nhttps://pc6.com"
